<!DOCTYPE html>
<html>
<head>
    <title>Saved Screenshots</title>

    <style>
        body {
            font-family: Arial;
            background: #0a0f24;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #00e1ff;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #112;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0, 255, 255, 0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px cyan;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .back-btn {
            background: cyan;
            color: black;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {
            background: white;
        }
    </style>
</head>
<body>

<h1>📸 Saved Screenshots</h1>
<a href="/" class="back-btn">🔙 Back to Scanner</a>

<div class="grid">
    {% for img in images %}
    <div class="card">
        <img src="/static/screenshots/{{ img }}" alt="Screenshot">
        <p>{{ img }}</p>
    </div>
    {% endfor %}
</div>

</body>
</html>
